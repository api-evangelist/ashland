common:
  - type: Portal
    url: https://www.ashland.com/
    title: Ashland Website
  - type: Support
    url: https://www.ashland.com/about/contact-us
    title: Contact Us
  - type: Features
    data:
      - name: Pharmaceutical Excipients
        description: >-
          Specialty excipients for pharmaceutical formulations including binders,
          film coatings, controlled release polymers, and solubility enhancers.
      - name: Personal Care Ingredients
        description: >-
          Functional ingredients for personal care formulations including
          thickeners, conditioning agents, and film formers for hair care,
          skin care, and color cosmetics.
      - name: Food and Beverage Additives
        description: >-
          Food-grade specialty ingredients including thickeners, stabilizers,
          and texture modifiers for food and beverage applications.
      - name: Industrial Specialties
        description: >-
          Specialty chemicals for coatings, adhesives, construction, and
          oilfield applications including cellulosics and acrylates.
      - name: Safety Data Sheets
        description: >-
          Comprehensive safety data sheets and technical documentation for
          all Ashland products accessible through the digital product portal.
  - type: UseCases
    data:
      - name: Pharmaceutical Formulation
        description: >-
          Pharmaceutical formulators source Ashland excipients for drug delivery
          systems including tablets, capsules, topicals, and controlled-release
          dosage forms.
      - name: Personal Care Product Development
        description: >-
          Cosmetic chemists use Ashland specialty ingredients to develop
          high-performance hair care, skin care, and color cosmetic formulations.
      - name: Industrial Applications
        description: >-
          Manufacturers incorporate Ashland specialties into coatings, adhesives,
          construction materials, and oilfield applications for performance
          enhancement.
  - type: Integrations
    data:
      - name: SAP Supplier Portal
        description: >-
          Ashland conducts B2B procurement and supplier management through
          enterprise SAP systems.
