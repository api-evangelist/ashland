description: >-
  Ashland is a global specialty chemicals company headquartered in Wilmington,
  Delaware, that provides high-performance ingredients and additives for the
  pharmaceutical, personal care, food and beverage, coatings, adhesives, and
  industrial markets. The company's product portfolio includes cellulose ethers,
  vinyl pyrrolidone polymers, acrylates, and specialty polymers sold under brands
  such as Benecel, Klucel, Natrosol, Plasdone, and Povidone. Ashland serves
  over 10,000 customers in more than 100 countries. Ashland does not offer a
  public developer API but provides digital product selection tools, safety data
  sheets, and technical documentation through its website.
apis:
  - aid: ashland:product-finder
    name: Ashland Product Finder
    description: >-
      Ashland's digital product finder tool enables customers to search and
      filter the specialty chemicals portfolio by application, industry, function,
      and chemistry type to identify the right ingredients for formulations.
